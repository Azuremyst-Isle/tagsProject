<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Main Dashboard</title>
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/newtag.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="navbar-brand">Tags Dashboard</div>
        <button class="navbar-toggle" aria-label="Toggle navigation">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
        <ul class="navbar-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="search.html">Search</a></li>
          <li><a href="event-control.html">Event Control</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="form-section card">
        <h2>Add New Item</h2>
        <form id="newTagForm" class="form-section">
          <label for="rfid_tag">RFID Tag</label>
          <input type="text" id="rfid_tag" name="rfid_tag" required />

          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />

          <label for="description">Description</label>
          <input type="text" id="description" name="description" required />

          <label for="status">Status</label>
          <select id="status" name="status" required>
            <option value="available">Available</option>
            <option value="unavailable">Unavailable</option>
          </select>

          <label for="certification_code">Certification Code</label>
          <input
            type="text"
            id="certification_code"
            name="certification_code"
            required
          />

          <label for="owner_name">Owner Name</label>
          <input type="text" id="owner_name" name="owner_name" required />

          <label for="retailer_id">Retailer ID</label>
          <input
            type="number"
            id="retailer_id"
            name="retailer_id"
            required
            min="1"
          />

          <button type="submit">Submit</button>
        </form>
        <div id="formMessage"></div>
      </section>
    </main>
    <footer>
      <!-- Footer content goes here -->
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./scripts/index-page.js"></script>
    <script>
      // Form submission handler
      document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("newTagForm");
        const messageDiv = document.getElementById("formMessage");
        if (form) {
          form.addEventListener("submit", async function (e) {
            e.preventDefault();
            const data = {
              rfid_tag: form.rfid_tag.value,
              name: form.name.value,
              description: form.description.value,
              status: form.status.value,
              certification_code: form.certification_code.value,
              owner_name: form.owner_name.value,
              retailer_id: parseInt(form.retailer_id.value, 10),
            };
            try {
              const res = await fetch(
                `${window.RfidApi_HostAddress || ""}/api/items`,
                {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify(data),
                },
              );
              if (res.ok) {
                messageDiv.textContent = "Item added successfully!";
                messageDiv.style.color = "green";
                form.reset();
              } else {
                const err = await res.text();
                messageDiv.textContent = `Error: ${err}`;
                messageDiv.style.color = "red";
              }
            } catch (error) {
              messageDiv.textContent = `Network error: ${error}`;
              messageDiv.style.color = "red";
            }
          });
        }
      });
    </script>
    <script>
      // Responsive navbar toggle
      document.addEventListener("DOMContentLoaded", function () {
        const toggle = document.querySelector(".navbar-toggle");
        const links = document.querySelector(".navbar-links");
        if (toggle && links) {
          toggle.addEventListener("click", function () {
            links.classList.toggle("active");
          });
        }
      });
    </script>
  </body>
</html>
